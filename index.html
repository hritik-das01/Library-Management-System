<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIIT CENTRAL Library | Professional Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d4d;
            --primary-hover: #ff6666;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --text-main: #e0e0e0;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- UI Components --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1, h2, h3 { margin-top: 0; letter-spacing: -0.5px; }
        .gradient-text {
            background: linear-gradient(90deg, #ff4d4d, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0 20px 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(255,77,77,0.2); }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: #334155; color: white; margin-left: 10px; }

        /* --- Book Grid --- */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .book-card {
            background: #1c1c21;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            gap: 15px;
            position: relative;
        }

        .book-card:hover { border-color: var(--primary); transform: scale(1.02); }

        .book-img {
            width: 80px;
            height: 110px;
            border-radius: 6px;
            object-fit: cover;
            background: #2d2d35;
        }

        .badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .badge-available { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-unavailable { background: rgba(239, 68, 68, 0.1); color: var(--primary); }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Auth Sections --- */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
        .auth-container { width: 100%; max-width: 450px; }

        /* --- CHATBOT STYLES --- */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            display: none; /* Hidden until login */
        }

        #chat-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 8px 24px rgba(255, 77, 77, 0.4);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 500px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .chat-header {
            background: #1c1c21;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0d0d0f;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 13.5px;
            line-height: 1.5;
        }

        .msg-bot { background: #2d2d35; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
            background: var(--card-bg);
        }

        .chat-input-area input { margin: 0; padding: 10px; flex: 1; }

    </style>
</head>
<body>

<div class="container" id="auth-screen">
    <div class="auth-container glass-card">
        <h1 class="gradient-text" style="text-align:center">KIIT CENTRAL LIBRARY</h1>
        
        <div id="login-form">
            <h2>Sign In</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn-primary" style="width:100%" onclick="handleLogin()">Access Dashboard</button>
            <p style="text-align:center; color: var(--text-dim); font-size: 14px;">
                New Librarian? <a href="#" onclick="toggleAuth()" style="color:var(--primary)">Create Account</a>
            </p>
        </div>

        <div id="reg-form" style="display:none">
            <h2>Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Create Password">
            <button class="btn-primary" style="width:100%" onclick="handleRegister()">Register Account</button>
            <p style="text-align:center; color: var(--text-dim); font-size: 14px;">
                Already have account? <a href="#" onclick="toggleAuth()" style="color:var(--primary)">Login</a>
            </p>
        </div>
    </div>
</div>

<div class="container" id="main-dashboard" style="display:none">
    <header style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <div>
            <h1 id="user-greet">Welcome</h1>
            <p style="color:var(--text-dim)">ID: <span id="user-id"></span></p>
        </div>
        <button class="btn-secondary" onclick="logout()">Logout</button>
    </header>

    <div class="glass-card" style="margin-bottom: 30px;">
        <h3>Search Catalog</h3>
        <input type="text" id="search-input" placeholder="Search by title, author, or genre..." onkeyup="renderCatalog()">
        
        <div class="book-grid" id="catalog-grid"></div>
    </div>

    <div class="glass-card">
        <h3>Your Active Loans</h3>
        <div id="loans-list"></div>
    </div>
</div>

<div class="chat-widget" id="chat-widget">
    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <span>📚 Library Assistant</span>
            <button onclick="toggleChat()" style="background:none; color:white; font-size: 20px; padding:0;">×</button>
        </div>
        <div class="chat-messages" id="chat-msgs">
            <div class="msg msg-bot">Hello! I'm your KIIT Assistant. You can ask me to "find [book title]", or ask about "hours" and "fines"!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ask me something..." onkeypress="if(event.key==='Enter') handleChat()">
            <button class="btn-primary" style="padding: 10px" onclick="handleChat()">Send</button>
        </div>
    </div>
    <button id="chat-toggle" onclick="toggleChat()">💬</button>
</div>

<div class="modal-overlay" id="issue-modal">
    <div class="glass-card" style="width: 400px;">
        <h2 id="modal-book-title">Issue Book</h2>
        <p id="modal-book-author" style="color:var(--text-dim)"></p>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        
        <label>Return Date</label>
        <input type="date" id="return-date-input">
        
        <div style="display:flex; justify-content: flex-end; gap: 10px;">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="processIssue()">Confirm Loan</button>
        </div>
    </div>
</div>

<script>
    /* 1. STATE MANAGEMENT */
    let users = JSON.parse(localStorage.getItem('lib_users')) || [];
    let currentUser = null;
    let books = JSON.parse(localStorage.getItem('lib_books')) || [
        { id: 1, title: "The Great Gatsby", author: "F. Scott Fitzgerald", loans: [] },
        { id: 2, title: "1984", author: "George Orwell", loans: [] },
        { id: 3, title: "Atomic Habits", author: "James Clear", loans: [] },
        { id: 4, title: "The Silent Patient", author: "Alex Michaelides", loans: [] },
        { id: 5, title: "Project Hail Mary", author: "Andy Weir", loans: [] },
        { id: 6, title: "The Alchemist", author: "Paulo Coelho", loans: [] },
        { id: 7, title: "The Hobbit", author: "J.R.R. Tolkien", loans: [] },
        { id: 8, title: "Dune", author: "Frank Herbert", loans: [] },
        { id: 9, title: "Foundation", author: "Isaac Asimov", loans: [] },
        { id: 10, title: "The Seven Husbands of Evelyn Hugo", author: "Taylor Jenkins Reid", loans: [] },
        { id: 11, title: "The Midnight Library", author: "Matt Haig", loans: [] },
        { id: 12, title: "Crying in H Mart", author: "Michelle Zauner", loans: [] },
        { id: 13, title: "The Song of Achilles", author: "Madeline Miller", loans: [] },
        { id: 14, title: "Circe", author: "Madeline Miller", loans: [] },
        { id: 15, title: "Brave New World", author: "Aldous Huxley", loans: [] },
        { id: 16, title: "Fahrenheit 451", author: "Ray Bradbury", loans: [] },
        { id: 17, title: "Thinking, Fast and Slow", author: "Daniel Kahneman", loans: [] },
        { id: 18, title: "Sapiens", author: "Yuval Noah Harari", loans: [] },
        { id: 19, title: "The Psychology of Money", author: "Morgan Housel", loans: [] },
        { id: 20, title: "Deep Work", author: "Cal Newport", loans: [] },
        { id: 21, title: "The Power of Habit", author: "Charles Duhigg", loans: [] },
        { id: 22, title: "Man's Search for Meaning", author: "Viktor Frankl", loans: [] },
        { id: 23, title: "The Courage to Be Disliked", author: "Ichiro Kishimi", loans: [] },
        { id: 24, title: "A Promised Land", author: "Barack Obama", loans: [] },
        { id: 25, title: "Becoming", author: "Michelle Obama", loans: [] },
        { id: 26, title: "Educated", author: "Tara Westover", loans: [] }
    ];

    let activeIssueId = null;

    /* 2. AUTHENTICATION LOGIC */
    function toggleAuth() {
        const loginForm = document.getElementById('login-form');
        const regForm = document.getElementById('reg-form');
        loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
        regForm.style.display = regForm.style.display === 'none' ? 'block' : 'none';
    }

    function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !email || !pass) return alert("Fill all fields");
        if(users.find(u => u.email === email)) return alert("Email already registered");

        const newUser = { id: 'LIB-' + Math.floor(Math.random()*9000 + 1000), name, email, pass };
        users.push(newUser);
        localStorage.setItem('lib_users', JSON.stringify(users));
        alert("Registration Successful! Please login.");
        toggleAuth();
    }

    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const user = users.find(u => u.email === email && u.pass === pass);

        if(!user) return alert("Invalid credentials. Please register first.");
        
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        document.getElementById('chat-widget').style.display = 'block'; // Show Chatbot
        document.getElementById('user-greet').innerText = `Hello, ${user.name}`;
        document.getElementById('user-id').innerText = user.id;
        
        renderCatalog();
        renderLoans();
    }

    function logout() {
        currentUser = null;
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('chat-widget').style.display = 'none'; // Hide Chatbot
        document.getElementById('chat-window').style.display = 'none';
    }

    /* 3. CORE LOGIC */
    function isBookAvailable(bookId) {
        const book = books.find(b => b.id === bookId);
        const today = new Date().toISOString().split('T')[0];
        return !book.loans.some(loan => loan.returnDate >= today);
    }

    function renderCatalog() {
        const grid = document.getElementById('catalog-grid');
        const search = document.getElementById('search-input').value.toLowerCase();
        grid.innerHTML = '';

        books.filter(b => b.title.toLowerCase().includes(search) || b.author.toLowerCase().includes(search)).forEach(book => {
            const available = isBookAvailable(book.id);
            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <img src="https://picsum.photos/seed/${book.id}/80/110" class="book-img">
                <div style="flex:1">
                    <span class="badge ${available ? 'badge-available' : 'badge-unavailable'}">
                        ${available ? 'Available' : 'Issued Out'}
                    </span>
                    <h4 style="margin: 8px 0 4px 0">${book.title}</h4>
                    <p style="font-size:12px; color:var(--text-dim); margin:0">${book.author}</p>
                    <button class="btn-primary" style="margin-top:12px; font-size:12px; padding: 6px 12px; width:100%" 
                        ${!available ? 'disabled style="background:#2d2d35; color:#666"' : `onclick="openIssueModal(${book.id})"`}>
                        ${available ? 'Issue Now' : 'Currently Unavailable'}
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function openIssueModal(id) {
        activeIssueId = id;
        const book = books.find(b => b.id === id);
        document.getElementById('modal-book-title').innerText = book.title;
        document.getElementById('modal-book-author').innerText = book.author;
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('return-date-input').setAttribute('min', today);
        document.getElementById('issue-modal').style.display = 'flex';
    }

    function processIssue() {
        const returnDate = document.getElementById('return-date-input').value;
        if(!returnDate) return alert("Please select a return date");
        const book = books.find(b => b.id === activeIssueId);
        const today = new Date().toISOString().split('T')[0];
        if(!isBookAvailable(activeIssueId)) return alert("Someone just issued this book!");

        book.loans.push({ userId: currentUser.id, issueDate: today, returnDate: returnDate });
        localStorage.setItem('lib_books', JSON.stringify(books));
        closeModal();
        renderCatalog();
        renderLoans();
    }

    function renderLoans() {
        const list = document.getElementById('loans-list');
        list.innerHTML = '';
        let hasLoans = false;

        books.forEach(book => {
            book.loans.filter(l => l.userId === currentUser.id).forEach(loan => {
                hasLoans = true;
                list.innerHTML += `
                    <div class="book-card" style="margin-bottom:10px; border-left: 4px solid var(--success)">
                        <div style="flex:1">
                            <h4>${book.title}</h4>
                            <p style="font-size:12px">Due Date: <b style="color:var(--primary)">${loan.returnDate}</b></p>
                        </div>
                        <button class="btn-secondary" style="font-size:12px" onclick="returnBook(${book.id})">Return Book</button>
                    </div>
                `;
            });
        });
        if(!hasLoans) list.innerHTML = `<p style="color:var(--text-dim); text-align:center">No active loans found.</p>`;
    }

    function returnBook(bookId) {
        const book = books.find(b => b.id === bookId);
        book.loans = book.loans.filter(l => l.userId !== currentUser.id);
        localStorage.setItem('lib_books', JSON.stringify(books));
        renderCatalog();
        renderLoans();
    }

    function closeModal() {
        document.getElementById('issue-modal').style.display = 'none';
        activeIssueId = null;
    }

    /* 4. CHATBOT LOGIC */
    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
    }

    function addChatMessage(text, isUser = false) {
        const container = document.getElementById('chat-msgs');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isUser ? 'msg-user' : 'msg-bot'}`;
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function handleChat() {
        const input = document.getElementById('chat-input');
        const query = input.value.trim().toLowerCase();
        if(!query) return;

        addChatMessage(input.value, true);
        input.value = '';

        setTimeout(() => {
            if (query.includes('find') || query.includes('search')) {
                const term = query.replace('find','').replace('search','').trim();
                const found = books.find(b => b.title.toLowerCase().includes(term));
                if(found) {
                    const status = isBookAvailable(found.id) ? "available for issue." : "currently issued out.";
                    addChatMessage(`I found "${found.title}" by ${found.author}. It is ${status}`);
                } else {
                    addChatMessage("Sorry, I couldn't find that book in the KIIT catalog.");
                }
            } 
            else if (query.includes('hour') || query.includes('time')) {
                addChatMessage("The KIIT Central Library is open from 8:00 AM to 10:00 PM daily in offline mode.");
            }
            else if (query.includes('fine') || query.includes('fee')) {
                addChatMessage("Overdue books incur a fine of ₹5 per day.");
            }
            else if (query.includes('hi') || query.includes('hello')) {
                addChatMessage("Hello! I'm your KIIT Library Assistant. How can I help you find a book today?");
            }
            else {
                addChatMessage("I'm not sure I understand. You can ask me to 'find [book name]', or ask about 'hours' or 'fines'.");
            }
        }, 600);
    }
</script>

</body>
</html>
